<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ChatFlow</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root {
    /* Base surfaces — neutral gray dark */
    --bg-app: #1a1b1e;
    --bg-sidebar: #161719;
    --bg-panel: #161719;
    --bg-elevated: #232428;
    --bg-elevated-2: #2a2c31;
    --bg-input: #26272b;
    --bg-hover: #212327;
    --bg-active: #2c2620;

    /* Borders */
    --border: #2c2e33;
    --border-soft: #232428;

    /* Text */
    --text-primary: #e9eaee;
    --text-secondary: #a3a6ad;
    --text-muted: #6e7178;
    --text-faint: #54565c;

    /* Accent — coral */
    --accent: #ff7a59;
    --accent-hover: #ff8d70;
    --accent-press: #ec6843;
    --accent-soft: rgba(255, 122, 89, 0.14);
    --accent-text: #fff1ec;

    /* Status */
    --online: #3ba55d;
    --idle: #f0b232;
    --offline: #6e7178;
    --unread: #ff5b50;

    --radius-sm: 8px;
    --radius: 12px;
    --radius-lg: 16px;
    --radius-bubble: 16px;

    --shadow-pop: 0 12px 32px rgba(0,0,0,0.45);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Pretendard', 'Pretendard Variable', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: #0e0e10;
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-size: 14px;
    letter-spacing: -0.01em;
  }

  #root { height: 100vh; }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: #34363c;
    border-radius: 10px;
    border: 3px solid transparent;
    background-clip: padding-box;
  }
  ::-webkit-scrollbar-thumb:hover { background: #44464d; background-clip: padding-box; border: 3px solid transparent; }

  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea { font-family: inherit; }

  ::selection { background: var(--accent-soft); color: var(--accent-text); }

  /* ===== App shell ===== */
  .app {
    display: flex;
    height: 100vh;
    width: 100vw;
    background: var(--bg-app);
  }

  /* ===== Generic helpers ===== */
  .row { display: flex; align-items: center; }
  .col { display: flex; flex-direction: column; }
  .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .icon-btn {
    display: flex; align-items: center; justify-content: center;
    width: 34px; height: 34px; border-radius: 9px;
    color: var(--text-secondary);
    transition: background .14s, color .14s;
    flex: none;
  }
  .icon-btn:hover { background: var(--bg-elevated); color: var(--text-primary); }

  /* Avatar */
  .avatar {
    position: relative; flex: none;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; color: #fff; user-select: none;
    overflow: visible;
  }
  .avatar .av-inner {
    width: 100%; height: 100%; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .avatar.square { border-radius: 14px; }
  .avatar.square .av-inner { border-radius: 14px; }
  .status-dot {
    position: absolute; right: -1px; bottom: -1px;
    border-radius: 50%;
    border: 2.5px solid var(--bg-sidebar);
  }
  .status-dot.online { background: var(--online); }
  .status-dot.idle { background: var(--idle); }
  .status-dot.offline { background: var(--offline); }

  /* ===== Left sidebar ===== */
  .sidebar {
    width: 280px; flex: none;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border-soft);
    display: flex; flex-direction: column;
  }
  .me-card {
    display: flex; align-items: center; gap: 11px;
    padding: 13px 14px;
    border-bottom: 1px solid var(--border-soft);
  }
  .me-card .me-name { font-weight: 650; font-size: 14.5px; color: var(--text-primary); }
  .me-card .me-status { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 5px; margin-top: 1px; }
  .me-status .mini-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--online); box-shadow: 0 0 0 2px rgba(59,165,93,0.18); }

  .search-wrap { padding: 11px 12px 7px; }
  .search {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-input);
    border: 1px solid transparent;
    border-radius: 10px;
    padding: 8px 11px;
    transition: border .14s, background .14s;
  }
  .search:focus-within { border-color: var(--accent); background: #2b2c31; }
  .search input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text-primary); font-size: 13.5px;
  }
  .search input::placeholder { color: var(--text-muted); }

  .list-label {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 18px 6px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
    text-transform: uppercase; color: var(--text-faint);
  }
  .room-list { flex: 1; overflow-y: auto; padding: 0 8px 12px; }

  .room {
    display: flex; align-items: center; gap: 11px;
    padding: 9px 10px;
    border-radius: 11px;
    cursor: pointer;
    transition: background .12s;
    position: relative;
  }
  .room:hover { background: var(--bg-hover); }
  .room.active { background: var(--bg-elevated); }
  .room.active::before {
    content: ''; position: absolute; left: -8px; top: 50%; transform: translateY(-50%);
    width: 3px; height: 22px; border-radius: 0 3px 3px 0; background: var(--accent);
  }
  .room-main { flex: 1; min-width: 0; }
  .room-top { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
  .room-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .room.unread .room-name { font-weight: 700; }
  .room-time { font-size: 11px; color: var(--text-faint); flex: none; }
  .room-bottom { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 2px; }
  .room-preview { font-size: 12.5px; color: var(--text-muted); min-width: 0; }
  .room.unread .room-preview { color: var(--text-secondary); }
  .unread-badge {
    flex: none; min-width: 18px; height: 18px; padding: 0 5px;
    border-radius: 9px; background: var(--accent);
    color: #fff; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(255,122,89,0.4);
  }
  .mute-badge { color: var(--text-faint); }

  /* ===== Center chat ===== */
  .chat { flex: 1; min-width: 0; display: flex; flex-direction: column; background: var(--bg-app); }
  .chat-header {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .chat-title { font-size: 15.5px; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
  .chat-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; display: flex; align-items: center; gap: 6px; }
  .chat-header .spacer { flex: 1; }

  .messages { flex: 1; overflow-y: auto; padding: 18px 24px 8px; display: flex; flex-direction: column; }

  .date-divider { display: flex; align-items: center; gap: 12px; margin: 14px 0 16px; }
  .date-divider::before, .date-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .date-divider span { font-size: 11.5px; font-weight: 600; color: var(--text-muted); padding: 3px 12px; background: var(--bg-elevated); border-radius: 20px; }

  .msg-group { display: flex; gap: 11px; margin-bottom: 14px; }
  .msg-group.me { flex-direction: row-reverse; }
  .msg-group .stack { display: flex; flex-direction: column; min-width: 0; max-width: 66%; }
  .msg-group.me .stack { align-items: flex-end; }

  .msg-meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 5px; padding: 0 2px; }
  .msg-author { font-size: 13px; font-weight: 650; color: var(--text-primary); }
  .msg-time-inline { font-size: 11px; color: var(--text-faint); }

  .bubble {
    padding: 9px 13px;
    border-radius: var(--radius-bubble);
    font-size: 14px; line-height: 1.5;
    color: var(--text-primary);
    word-break: break-word;
    position: relative;
    max-width: 100%;
  }
  .bubble.them { background: var(--bg-elevated); border-top-left-radius: 5px; }
  .bubble.mine { background: var(--accent); color: #fff; border-top-right-radius: 5px; }
  .bubble + .bubble { margin-top: 4px; }

  .bubble-line { display: flex; align-items: flex-end; gap: 7px; }
  .msg-group.me .bubble-line { flex-direction: row-reverse; }
  .bubble-foot { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; padding-bottom: 1px; flex: none; }
  .msg-group.them .bubble-foot { align-items: flex-start; }
  .read-tag { font-size: 10px; font-weight: 700; color: var(--accent); letter-spacing: 0.02em; }
  .read-tag.unread-r { color: var(--text-faint); }
  .stamp { font-size: 10.5px; color: var(--text-faint); white-space: nowrap; }

  /* typing indicator */
  .typing-row { display: flex; gap: 11px; margin-bottom: 14px; align-items: flex-end; }
  .typing-bubble { background: var(--bg-elevated); border-radius: var(--radius-bubble); border-top-left-radius: 5px; padding: 12px 15px; display: flex; gap: 5px; align-items: center; }
  .typing-bubble .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); animation: blink 1.3s infinite both; }
  .typing-bubble .dot:nth-child(2) { animation-delay: .2s; }
  .typing-bubble .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%, 60%, 100% { opacity: .3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-3px); } }

  /* composer */
  .composer { flex: none; padding: 12px 20px 18px; }
  .composer-inner {
    display: flex; align-items: flex-end; gap: 8px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 7px 8px 7px 14px;
    transition: border .14s;
  }
  .composer-inner:focus-within { border-color: var(--accent); }
  .composer textarea {
    flex: 1; background: none; border: none; outline: none; resize: none;
    color: var(--text-primary); font-size: 14px; line-height: 1.5;
    max-height: 120px; padding: 7px 0;
  }
  .composer textarea::placeholder { color: var(--text-muted); }
  .composer-tools { display: flex; align-items: center; gap: 2px; padding-bottom: 1px; }
  .send-btn {
    display: flex; align-items: center; justify-content: center;
    width: 38px; height: 38px; border-radius: 11px;
    background: var(--accent); color: #fff; flex: none;
    transition: background .14s, transform .1s, opacity .14s;
  }
  .send-btn:hover { background: var(--accent-hover); }
  .send-btn:active { transform: scale(0.93); }
  .send-btn:disabled { background: var(--bg-elevated-2); color: var(--text-faint); cursor: default; }

  /* ===== Right panel ===== */
  .panel {
    width: 280px; flex: none;
    background: var(--bg-panel);
    border-left: 1px solid var(--border-soft);
    display: flex; flex-direction: column;
  }
  .panel-hero {
    padding: 26px 20px 22px;
    display: flex; flex-direction: column; align-items: center;
    border-bottom: 1px solid var(--border-soft);
    text-align: center;
  }
  .panel-hero .ph-name { font-size: 16px; font-weight: 700; margin-top: 13px; }
  .panel-hero .ph-desc { font-size: 12.5px; color: var(--text-muted); margin-top: 6px; line-height: 1.5; }
  .panel-stats { display: flex; gap: 8px; margin-top: 16px; width: 100%; }
  .stat {
    flex: 1; background: var(--bg-elevated); border-radius: 11px;
    padding: 9px 4px; text-align: center;
  }
  .stat .num { font-size: 15px; font-weight: 700; color: var(--text-primary); }
  .stat .lbl { font-size: 10.5px; color: var(--text-muted); margin-top: 2px; }

  .panel-section-label {
    padding: 16px 20px 8px; font-size: 11px; font-weight: 700;
    letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-faint);
    display: flex; align-items: center; justify-content: space-between;
  }
  .members { flex: 1; overflow-y: auto; padding: 0 10px 16px; }
  .member {
    display: flex; align-items: center; gap: 11px;
    padding: 7px 10px; border-radius: 10px; cursor: pointer;
    transition: background .12s;
  }
  .member:hover { background: var(--bg-hover); }
  .member .m-name { font-size: 13.5px; font-weight: 600; color: var(--text-primary); }
  .member .m-role { font-size: 11.5px; color: var(--text-muted); }
  .member.off .m-name { color: var(--text-secondary); }
  .member.off .avatar { opacity: 0.55; }
  .role-pill { font-size: 10px; font-weight: 700; color: var(--accent); background: var(--accent-soft); padding: 1px 6px; border-radius: 6px; }

  .fade-in { animation: fadeIn .22s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ===== Empty states ===== */
  .empty-chat { align-items: center; justify-content: center; }
  .empty-inner { display: flex; flex-direction: column; align-items: center; text-align: center; max-width: 380px; padding: 24px; }
  .empty-logo {
    position: relative; width: 80px; height: 80px; border-radius: 24px;
    background: linear-gradient(135deg, #ff7a59, #ff4f8b);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 18px 44px rgba(255,90,110,0.32);
    margin-bottom: 26px;
  }
  .empty-logo-ping {
    position: absolute; inset: 0; border-radius: 24px;
    border: 2px solid var(--accent); opacity: 0;
    animation: ping 2.6s ease-out infinite;
  }
  @keyframes ping { 0% { transform: scale(1); opacity: .55; } 100% { transform: scale(1.5); opacity: 0; } }
  .empty-h { font-size: 23px; font-weight: 750; letter-spacing: -0.02em; margin-bottom: 11px; }
  .empty-p { font-size: 14.5px; color: var(--text-muted); line-height: 1.6; margin-bottom: 26px; }
  .empty-cta {
    display: inline-flex; align-items: center; gap: 9px;
    height: 46px; padding: 0 22px; border-radius: 13px;
    background: var(--accent); color: #fff; font-size: 14.5px; font-weight: 680;
    transition: background .14s, transform .08s;
  }
  .empty-cta:hover { background: var(--accent-hover); }
  .empty-cta:active { transform: scale(0.97); }
  .empty-hints { display: flex; gap: 8px; margin-top: 34px; }
  .empty-hint {
    display: flex; align-items: center; gap: 7px; white-space: nowrap;
    font-size: 12.5px; color: var(--text-secondary);
    background: var(--bg-elevated); border: 1px solid var(--border-soft);
    padding: 8px 13px; border-radius: 11px;
  }
  .empty-hint .eh-ic { color: var(--text-muted); display: flex; font-size: 11px; font-weight: 700; }

  .empty-panel { align-items: center; justify-content: center; }
  .empty-panel-inner { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 28px; }
  .ep-ic { width: 56px; height: 56px; border-radius: 16px; background: var(--bg-elevated); border: 1px solid var(--border-soft); display: flex; align-items: center; justify-content: center; color: var(--text-muted); margin-bottom: 16px; }
  .ep-t { font-size: 14.5px; font-weight: 650; color: var(--text-secondary); margin-bottom: 7px; }
  .ep-d { font-size: 13px; color: var(--text-faint); line-height: 1.6; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="main-app.jsx"></script>
</body>
</html>
